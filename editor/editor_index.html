<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Relatórios</title>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, color = 'currentColor', size = 24, className = '' }) => {
            const iconNameKebab = name.replace(/([a-z0-9]|(?=[A-Z]))([A-Z])/g, '$1-$2').toLowerCase();
            useEffect(() => {
                if (window.lucide) {
                    lucide.createIcons();
                }
            }, [name]);
            if (!window.lucide || !lucide.icons[iconNameKebab]) {
                return <span className={`icon-placeholder ${className}`} style={{ width: size, height: size, display: 'inline-block' }} />;
            }
            const iconSvg = lucide.icons[iconNameKebab].toSvg({ color, 'stroke-width': 2, width: size, height: size });
            return <span className={`inline-flex justify-center items-center ${className}`} dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };
        
        const CustomModal = ({ modal, setModal }) => {
            if (!modal) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 text-center">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">{modal.title || 'Editor de Relatórios'}</h3>
                        <p className="text-gray-700 whitespace-pre-line mb-6">{modal.message}</p>
                        <div className="flex gap-4">
                            {modal.confirm ? (
                                <>
                                    <button onClick={() => { if(modal.onCancel) modal.onCancel(); setModal(null); }} className="flex-1 p-2 bg-gray-300 rounded hover:bg-gray-400">Cancelar</button>
                                    <button onClick={() => { if(modal.onConfirm) modal.onConfirm(); setModal(null); }} className="flex-1 p-2 bg-red-600 text-white rounded hover:bg-red-700">Confirmar</button>
                                </>
                            ) : (
                                <button onClick={() => setModal(null)} className="w-full p-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const TIPOS_CAMPO = [
          { id: 'texto_curto', nome: 'Texto Curto' }, { id: 'texto_longo', nome: 'Texto Longo' },
          { id: 'numero', nome: 'Número' }, { id: 'sim_nao', nome: 'Sim/Não' },
          { id: 'escolha_unica', nome: 'Escolha Única' }, { id: 'multipla_escolha', nome: 'Múltipla Escolha' },
          { id: 'localizacao', nome: 'Localização' }, { id: 'api_dinamica', nome: 'API Dinâmica' },
          { id: 'calculado', nome: 'Campo Calculado' }
        ];

        const EditorWYSIWYG = () => {
          const [config, setConfig] = useState({
            versao_atual: "1.0.0",
            data_atualizacao: new Date().toISOString(),
            configuracoes: { modo_debug: true, permitir_importacao_manual: true },
            relatorios: {}
          });
          const [modal, setModal] = useState(null);
          const [relatorioSelecionado, setRelatorioSelecionado] = useState(null);
          const [versaoSelecionada, setVersaoSelecionada] = useState(null);
          const [modoVisualizacao, setModoVisualizacao] = useState('editor');
          const [expandidos, setExpandidos] = useState({});
          const [editandoPergunta, setEditandoPergunta] = useState(null);
          const fileInputRef = useRef(null);

          const adicionarRelatorio = () => { /* ... */ };
          const adicionarVersao = () => { /* ... */ };
          const adicionarPergunta = (parentId = null, respostaCondicional = null) => { /* ... */ };
          const atualizarVersao = (updates) => { /* ... */ };
          const atualizarPergunta = (perguntaId, updates) => { /* ... */ };
          const removerPergunta = (perguntaId) => {
            setModal({
                title: 'Confirmar Remoção',
                message: 'Deseja realmente remover esta pergunta e todas as suas sub-perguntas?',
                confirm: true,
                onConfirm: () => {
                    // Lógica de remoção...
                    setEditandoPergunta(null);
                }
            });
          };
          const moverPergunta = (perguntaId, direcao) => { /* ... */ };

          const exportarJSON = () => {
            const configParaExportar = {...config, data_atualizacao: new Date().toISOString()};
            setConfig(configParaExportar);
            
            setTimeout(() => {
                const dataStr = JSON.stringify(configParaExportar, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url; link.download = 'relatorios.json';
                link.click();
                URL.revokeObjectURL(url);
                setModal({ message: '✓ Arquivo JSON exportado com sucesso!' });
            }, 100);
          };

          const importarJSON = (event) => {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                const json = JSON.parse(e.target.result);
                if (!json.relatorios || !json.versao_atual) throw new Error("Estrutura inválida");
                setConfig(json);
                setModal({ message: '✓ JSON importado com sucesso!' });
              } catch (error) {
                setModal({ title: 'Erro de Importação', message: 'Arquivo JSON inválido ou corrompido.' });
              }
            };
            reader.readAsText(file);
            event.target.value = '';
          };
          
          const encontrarPergunta = (perguntas, id) => {
            for (let p of perguntas) {
              if (p.id === id) return p;
              if (p.perguntas_condicionais) {
                for (let resposta in p.perguntas_condicionais) {
                  const encontrada = encontrarPergunta(p.perguntas_condicionais[resposta], id);
                  if (encontrada) return encontrada;
                }
              }
            }
            return null;
          };

          const versaoAtual = relatorioSelecionado && versaoSelecionada ? config.relatorios[relatorioSelecionado]?.versoes[versaoSelecionada] : null;
          const perguntaParaEditar = editandoPergunta && versaoAtual ? encontrarPergunta(versaoAtual.perguntas, editandoPergunta) : null;
          
          return (
            <div className="min-h-screen bg-gray-50">
              <CustomModal modal={modal} setModal={setModal} />
              
              <div className="bg-red-700 text-white p-4 shadow-lg">
                <div className="max-w-7xl mx-auto flex justify-between items-center">
                  <div>
                    <h1 className="text-2xl font-bold">Editor NeoCheckX</h1>
                    <p className="text-sm text-red-200">Crie e edite estruturas de relatórios</p>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => fileInputRef.current?.click()} className="px-4 py-2 bg-white text-red-700 rounded hover:bg-red-50 flex items-center gap-2"><Icon name="upload" size={18} /> Importar</button>
                    <button onClick={exportarJSON} className="px-4 py-2 bg-red-800 text-white rounded hover:bg-red-900 flex items-center gap-2"><Icon name="download" size={18} /> Exportar</button>
                    <input ref={fileInputRef} type="file" accept=".json" onChange={importarJSON} className="hidden" />
                  </div>
                </div>
              </div>

              <div className="max-w-7xl mx-auto p-4">
                  {/* Conteúdo principal com renderização condicional */}
                  { !relatorioSelecionado ? (
                    <div className="text-center p-12 bg-white rounded-lg shadow">
                        <Icon name="file-plus-2" size={64} className="mx-auto text-gray-300 mb-4" />
                        <h3 className="text-xl font-semibold">Nenhum relatório selecionado</h3>
                        <p className="text-gray-500 mb-6">Crie um novo relatório ou importe um arquivo JSON para começar.</p>
                        <button onClick={adicionarRelatorio} className="px-6 py-3 bg-red-600 text-white rounded-lg hover:bg-red-700 inline-flex items-center gap-2"><Icon name="plus" size={20}/> Criar Relatório</button>
                    </div>
                  ) : (
                    <div className="grid grid-cols-12 gap-4">
                      {/* Coluna da Esquerda (Sidebar) */}
                      <div className="col-span-3"> {/* ... */} </div>
                      {/* Coluna da Direita (Área de Edição) */}
                      <div className="col-span-9">
                        <div className="bg-white rounded-lg shadow p-4 mb-4">
                            {/* ... Header do Relatório ... */}
                        </div>

                        {modoVisualizacao === 'editor' && ( <div className="bg-white rounded-lg shadow p-4">{/* ... Editor de Perguntas ... */}</div> )}
                        {modoVisualizacao === 'preview' && ( <div className="bg-white rounded-lg shadow p-6">{/* ... Preview ... */}</div> )}
                        {modoVisualizacao === 'json' && ( 
                            <div className="bg-white rounded-lg shadow p-4">
                               <div className="flex justify-between items-center mb-4">
                                 <h3 className="font-semibold">Visualização JSON</h3>
                                 <button onClick={() => { navigator.clipboard.writeText(JSON.stringify(config.relatorios[relatorioSelecionado], null, 2)); setModal({message: '✓ JSON copiado!'}); }} className="px-3 py-2 bg-gray-200 rounded hover:bg-gray-300 flex items-center gap-2"> <Icon name="copy" size={16} /> Copiar </button>
                               </div>
                               <pre className="bg-gray-900 text-green-400 p-4 rounded overflow-auto max-h-[600px] text-sm">{JSON.stringify(config.relatorios[relatorioSelecionado], null, 2)}</pre>
                             </div>
                        )}
                      </div>
                    </div>
                  )}
              </div>
            </div>
          );
        };
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<EditorWYSIWYG />);
    </script>
</body>
</html>
