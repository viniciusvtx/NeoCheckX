<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Relatórios</title>
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, color = 'currentColor', size = 24, className = '' }) => {
            const iconNameKebab = name.replace(/([a-z0-9]|(?=[A-Z]))([A-Z])/g, '$1-$2').toLowerCase();
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name, size, color, className]);
            if (!window.lucide || !lucide.icons[iconNameKebab]) {
                return <span className={`icon-placeholder ${className}`} style={{ width: size, height: size, display: 'inline-block' }} />;
            }
            const iconSvg = lucide.icons[iconNameKebab].toSvg({ color, 'stroke-width': 2, width: size, height: size });
            return <span className={`inline-flex justify-center items-center ${className}`} dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };
        
        const CustomModal = ({ modal, setModal }) => {
            if (!modal) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[100]">
                    <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 text-center">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">{modal.title || 'Editor NeoCheckX'}</h3>
                        <p className="text-gray-700 whitespace-pre-line mb-6">{modal.message}</p>
                        <div className="flex gap-4">
                            {modal.confirm ? (
                                <>
                                    <button onClick={() => { if(modal.onCancel) modal.onCancel(); setModal(null); }} className="flex-1 p-2 bg-gray-300 rounded hover:bg-gray-400">Cancelar</button>
                                    <button onClick={() => { if(modal.onConfirm) modal.onConfirm(); setModal(null); }} className="flex-1 p-2 bg-red-600 text-white rounded hover:bg-red-700">Confirmar</button>
                                </>
                            ) : (
                                <button onClick={() => setModal(null)} className="w-full p-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const TIPOS_CAMPO = [
          { id: 'texto_curto', nome: 'Texto Curto' }, { id: 'texto_longo', nome: 'Texto Longo' },
          { id: 'numero', nome: 'Número' }, { id: 'sim_nao', nome: 'Sim/Não' },
          { id: 'escolha_unica', nome: 'Escolha Única' }, { id: 'multipla_escolha', nome: 'Múltipla Escolha' },
          { id: 'localizacao', nome: 'Localização' }, { id: 'api_dinamica', nome: 'API Dinâmica' },
          { id: 'calculado', nome: 'Campo Calculado' }
        ];

        const EditorWYSIWYG = () => {
          const [config, setConfig] = useState({
            versao_atual: "1.0.0",
            data_atualizacao: new Date().toISOString(),
            configuracoes: { modo_debug: true, permitir_importacao_manual: true },
            relatorios: {}
          });
          const [modal, setModal] = useState(null);
          const [relatorioSelecionado, setRelatorioSelecionado] = useState(null);
          const [versaoSelecionada, setVersaoSelecionada] = useState(null);
          const [editandoPergunta, setEditandoPergunta] = useState(null);
          const fileInputRef = useRef(null);
          
          const adicionarRelatorio = () => {
            const id = prompt('ID do relatório (ex: suporte_lentidao):');
            if (!id || !id.trim()) return;
            if (config.relatorios[id]) {
                setModal({title: 'Erro', message: 'Já existe um relatório com este ID!'});
                return;
            }
            const novoRelatorio = {
                versao_atual: "1.0.0",
                versoes: { "1.0.0": { id, titulo: "Novo Relatório", descricao: "Descrição do relatório", data_criacao: new Date().toISOString().split('T')[0], status: "ativa", perguntas: [] } }
            };
            setConfig(prev => ({...prev, relatorios: {...prev.relatorios, [id]: novoRelatorio}}));
            setRelatorioSelecionado(id);
            setVersaoSelecionada("1.0.0");
          };
          
          const removerRelatorio = (idParaRemover) => {
            setModal({
                title: 'Confirmar Exclusão',
                message: `Deseja realmente excluir o relatório "${config.relatorios[idParaRemover].versoes[config.relatorios[idParaRemover].versao_atual].titulo}"?`,
                confirm: true,
                onConfirm: () => {
                    setConfig(prev => {
                        const novosRelatorios = {...prev.relatorios};
                        delete novosRelatorios[idParaRemover];
                        return {...prev, relatorios: novosRelatorios};
                    });
                }
            });
          };

          const atualizarDadosRelatorio = (updates) => {
            setConfig(prev => {
                const newState = JSON.parse(JSON.stringify(prev));
                newState.relatorios[relatorioSelecionado] = { ...newState.relatorios[relatorioSelecionado], ...updates };
                return newState;
            });
          };
          
          const atualizarVersao = (updates) => {
            setConfig(prev => {
                const newState = JSON.parse(JSON.stringify(prev));
                const relatorio = newState.relatorios[relatorioSelecionado];
                if (relatorio && relatorio.versoes[versaoSelecionada]) {
                    relatorio.versoes[versaoSelecionada] = { ...relatorio.versoes[versaoSelecionada], ...updates };
                }
                return newState;
            });
          };

          const atualizarPergunta = (perguntaId, updates) => {
              const perguntasAtuais = config.relatorios[relatorioSelecionado].versoes[versaoSelecionada].perguntas;
              const atualizarRecursivo = (perguntas) => perguntas.map(p => {
                  if (p.id === perguntaId) return { ...p, ...updates };
                  return p;
              });
              atualizarVersao({ perguntas: atualizarRecursivo(perguntasAtuais) });
          };
          
          const adicionarPergunta = () => {
            const novaPergunta = { id: `p_${Date.now()}`, tipo: 'texto_curto', texto: 'Nova Pergunta', obrigatorio: true };
            const perguntasAtuais = config.relatorios[relatorioSelecionado].versoes[versaoSelecionada].perguntas;
            let perguntasAtualizadas = [...perguntasAtuais, novaPergunta];
            atualizarVersao({ perguntas: perguntasAtualizadas });
            setEditandoPergunta(novaPergunta.id);
          };

          const removerPergunta = (perguntaId) => {
            setModal({
                title: 'Confirmar Remoção',
                message: 'Deseja realmente remover esta pergunta?',
                confirm: true,
                onConfirm: () => {
                    const perguntasAtuais = versaoAtual.perguntas;
                    const perguntasAtualizadas = perguntasAtuais.filter(p => p.id !== perguntaId);
                    atualizarVersao({ perguntas: perguntasAtualizadas });
                }
            });
          };

          const exportarJSON = () => {
            const configParaExportar = {...config, data_atualizacao: new Date().toISOString()};
            const dataStr = JSON.stringify(configParaExportar, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'relatorios.json';
            link.click();
            URL.revokeObjectURL(url);
            setModal({ message: '✓ Arquivo JSON exportado com sucesso!' });
          };

          const importarJSON = (event) => {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    if (!json.relatorios || !json.versao_atual) throw new Error("Estrutura inválida");
                    setConfig(json);
                    setModal({ message: '✓ JSON importado com sucesso!' });
                    setRelatorioSelecionado(null);
                    setVersaoSelecionada(null);
                } catch (error) {
                    setModal({ title: 'Erro de Importação', message: 'Arquivo JSON inválido ou corrompido.' });
                }
            };
            reader.readAsText(file);
            event.target.value = '';
          };

          const versaoAtual = relatorioSelecionado && versaoSelecionada ? config.relatorios[relatorioSelecionado]?.versoes[versaoSelecionada] : null;

          const encontrarPergunta = (id) => {
            if (!versaoAtual) return null;
            return versaoAtual.perguntas.find(p => p.id === id);
          }

          const perguntaParaEditar = encontrarPergunta(editandoPergunta);

          const renderEditorPergunta = (pergunta) => {
             if (!pergunta) return null;
             return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-lg shadow-lg p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="flex justify-between items-center mb-6 pb-4 border-b">
                            <h3 className="text-lg font-semibold">Editar Pergunta</h3>
                        </div>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium mb-1">Texto da Pergunta</label>
                                <input type="text" value={pergunta.texto} onChange={(e) => atualizarPergunta(pergunta.id, { texto: e.target.value })} className="w-full p-2 border rounded" />
                            </div>
                            <div className="flex items-center gap-2">
                                <input type="checkbox" id="obrigatorio" checked={!!pergunta.obrigatorio} onChange={(e) => atualizarPergunta(pergunta.id, { obrigatorio: e.target.checked })} className="rounded" />
                                <label htmlFor="obrigatorio" className="text-sm">Campo obrigatório</label>
                            </div>
                            <div>
                                <label className="block text-sm font-medium mb-1">Tipo de Campo</label>
                                <select value={pergunta.tipo} onChange={e => atualizarPergunta(pergunta.id, {tipo: e.target.value})} className="w-full p-2 border rounded">
                                    {TIPOS_CAMPO.map(tipo => <option key={tipo.id} value={tipo.id}>{tipo.nome}</option>)}
                                </select>
                            </div>
                        </div>
                        <div className="flex justify-end gap-4 pt-6 mt-6 border-t">
                            <button onClick={() => setEditandoPergunta(null)} className="px-6 py-2 bg-gray-200 text-gray-800 rounded hover:bg-gray-300">Cancelar</button>
                            <button onClick={() => setEditandoPergunta(null)} className="px-6 py-2 bg-red-600 text-white rounded hover:bg-red-700 flex items-center gap-2"><Icon name="save" size={18}/> Salvar</button>
                        </div>
                    </div>
                </div>
             );
          };

          const renderPergunta = (p) => (
            <div key={p.id} className="bg-white border rounded p-3 mb-3 hover:shadow-md transition-shadow">
                <div className="flex items-center justify-between">
                    <div className="flex-1 cursor-pointer" onClick={() => setEditandoPergunta(p.id)}>
                        <span className="font-medium">{p.texto}</span>
                        {p.obrigatorio && <span className="text-red-500 text-sm ml-2">*Obrigatório</span>}
                        <div className="text-xs text-gray-500 mt-1">{TIPOS_CAMPO.find(t => t.id === p.tipo)?.nome || p.tipo}</div>
                    </div>
                    <div className="flex items-center gap-2">
                        <button onClick={() => setEditandoPergunta(p.id)} className="p-1 text-blue-500 hover:text-blue-700"><Icon name="edit" size={16} /></button>
                        <button onClick={() => removerPergunta(p.id)} className="p-1 text-red-500 hover:text-red-700"><Icon name="trash-2" size={16}/></button>
                    </div>
                </div>
            </div>
          );
          
          return (
            <div className="min-h-screen bg-gray-50">
                <CustomModal modal={modal} setModal={setModal} />
                {perguntaParaEditar && renderEditorPergunta(perguntaParaEditar)}
                <div className="bg-red-700 text-white p-4 shadow-lg">
                    <div className="max-w-7xl mx-auto flex justify-between items-center">
                        <div>
                            <h1 className="text-2xl font-bold">Editor NeoCheckX</h1>
                            <p className="text-sm text-red-200">Crie e edite estruturas de relatórios</p>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={adicionarRelatorio} className="px-4 py-2 bg-white text-red-700 rounded hover:bg-red-50 flex items-center gap-2"><Icon name="plus" size={18} /> Criar Relatório</button>
                            <button onClick={() => fileInputRef.current?.click()} className="px-4 py-2 bg-red-800 hover:bg-red-900 text-white rounded flex items-center gap-2"><Icon name="upload" size={18} /> Importar</button>
                            <button onClick={exportarJSON} className="px-4 py-2 bg-red-800 hover:bg-red-900 text-white rounded flex items-center gap-2"><Icon name="download" size={18} /> Exportar</button>
                            <input ref={fileInputRef} type="file" accept=".json" onChange={importarJSON} className="hidden" />
                        </div>
                    </div>
                </div>
                <div className="max-w-7xl mx-auto p-4">
                    {!relatorioSelecionado ? (
                        <div className="bg-white rounded-lg shadow p-6">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6">Meus Relatórios</h2>
                            {Object.keys(config.relatorios).length === 0 ? (
                                <div className="text-center py-12 text-gray-500">
                                    <Icon name="folder-x" size={56} className="mx-auto mb-4 opacity-75"/>
                                    <p>Nenhum relatório encontrado.</p>
                                    <p className="text-sm">Clique em "Criar Relatório" ou "Importar" para começar.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {Object.entries(config.relatorios).map(([id, rel]) => {
                                        const versao = rel.versoes[rel.versao_atual];
                                        if (!versao) return null; // Defensive check to prevent crash
                                        return (
                                            <div key={id} className="rounded-lg bg-gray-50 border flex flex-col justify-between">
                                                <div className="p-4">
                                                    <div className="font-semibold text-gray-800">{versao.titulo}</div>
                                                    <p className="text-sm text-gray-600 mt-1 h-10">{versao.descricao}</p>
                                                </div>
                                                <div className="text-xs text-gray-500 p-4 mt-2 border-t flex justify-between items-center">
                                                    <span>v{rel.versao_atual} • {versao.perguntas.length} perguntas</span>
                                                    <div className="flex gap-2">
                                                        <button onClick={() => { setRelatorioSelecionado(id); setVersaoSelecionada(rel.versao_atual); }} className="px-3 py-2 bg-blue-100 text-blue-700 rounded hover:bg-blue-200 flex items-center gap-2 text-xs"><Icon name="edit" size={14}/><span>Editar</span></button>
                                                        <button onClick={() => removerRelatorio(id)} className="px-3 py-2 bg-red-100 text-red-700 rounded hover:bg-red-200 flex items-center gap-2 text-xs"><Icon name="trash-2" size={14}/><span>Excluir</span></button>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    ) : (
                        <div className="grid grid-cols-12 gap-4">
                            <div className="col-span-3">
                                <div className="bg-white rounded-lg shadow p-4">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="font-semibold">Relatórios</h2>
                                        <button onClick={adicionarRelatorio} className="p-1 text-red-600 hover:text-red-700" title="Adicionar relatório"><Icon name="plus-circle" size={20} /></button>
                                    </div>
                                    <div className="space-y-2">
                                        {Object.entries(config.relatorios).map(([id, rel]) => {
                                            const versao = rel.versoes[rel.versao_atual];
                                            if (!versao) return null; // Defensive check
                                            return (
                                                <div key={id} onClick={() => { setRelatorioSelecionado(id); setVersaoSelecionada(rel.versao_atual); }}
                                                    className={`p-3 rounded cursor-pointer border-2 transition-all ${relatorioSelecionado === id ? 'bg-red-50 border-red-500' : 'bg-gray-50 border-transparent hover:border-gray-300'}`}>
                                                    <div className="font-medium text-sm">{versao.titulo}</div>
                                                    <div className="text-xs text-gray-500 mt-1">v{rel.versao_atual} • {versao.perguntas.length} perguntas</div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <button onClick={() => setRelatorioSelecionado(null)} className="w-full mt-4 p-2 text-sm bg-gray-200 hover:bg-gray-300 rounded">← Voltar para a lista</button>
                                </div>
                            </div>
                            <div className="col-span-9">
                                <div className="bg-white rounded-lg shadow p-4 mb-4">
                                     <input type="text" value={versaoAtual?.titulo || ''} onChange={(e) => atualizarVersao({ titulo: e.target.value })} className="text-2xl font-bold w-full border-b-2 border-transparent hover:border-gray-300 focus:border-red-500 outline-none mb-2" />
                                     <textarea value={versaoAtual?.descricao || ''} onChange={(e) => atualizarVersao({ descricao: e.target.value })} className="text-gray-600 w-full border border-transparent hover:border-gray-300 focus:border-red-500 outline-none rounded p-1 mb-2" rows={2} />
                                     <div>
                                        <label className="text-sm font-medium text-gray-700">Versão Atual do Relatório</label>
                                        <input type="text" value={config.relatorios[relatorioSelecionado]?.versao_atual || ''} onChange={(e) => atualizarDadosRelatorio({ versao_atual: e.target.value })} className="w-full p-2 mt-1 border rounded" />
                                     </div>
                                </div>
                                <div className="bg-white rounded-lg shadow p-4">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-semibold text-xl">Perguntas</h3>
                                        <button onClick={adicionarPergunta} className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 flex items-center gap-2"><Icon name="plus" size={18}/> Adicionar Pergunta</button>
                                    </div>
                                    {versaoAtual?.perguntas.length > 0 ? versaoAtual.perguntas.map(renderPergunta) : <p className="text-center text-gray-500 py-8">Nenhuma pergunta criada.</p>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </div>
          );
        };
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<EditorWYSIWYG />);
    </script>
</body>
</html>
