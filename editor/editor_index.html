<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Relatórios</title>
    <link rel="icon" href="/NeoCheckX/favicon.ico" type="image/x-icon">
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        const Icon = ({ name, color = 'currentColor', size = 24, className = '' }) => {
            const iconNameKebab = name.replace(/([a-z0-9]|(?=[A-Z]))([A-Z])/g, '$1-$2').toLowerCase();
            const emojiMap = {
                save: '💾', plus: '➕', upload: '📤', download: '📥',
                edit: '✏️', 'trash-2': '🗑️', 'plus-circle': '⊕',
                'folder-x': '📁', x: '❌'
            };

            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name, size, color, className]);
            
            if (!window.lucide || !lucide.icons[iconNameKebab]) {
                return <span className={className} style={{fontSize: `${size*0.8}px`, lineHeight: 1}}>{emojiMap[name] || '❓'}</span>;
            }

            const iconSvg = lucide.icons[iconNameKebab].toSvg({ color, 'stroke-width': 2, width: size, height: size });
            return <span className={`inline-flex justify-center items-center ${className}`} dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };
        
        const CustomModal = ({ modal, setModal }) => { /* ... (same as before) ... */ };

        const TIPOS_CAMPO = [
          { id: 'texto_curto', nome: 'Texto Curto' }, { id: 'texto_longo', nome: 'Texto Longo' },
          { id: 'numero', nome: 'Número' }, { id: 'sim_nao', nome: 'Sim/Não' },
          { id: 'escolha_unica', nome: 'Escolha Única' },
        ];

        const EditorWYSIWYG = () => {
          const [config, setConfig] = useState({
            versao_atual: "1.0.0",
            data_atualizacao: new Date().toISOString(),
            configuracoes: { modo_debug: true, permitir_importacao_manual: true },
            relatorios: {}
          });
          const [modal, setModal] = useState(null);
          const [relatorioSelecionado, setRelatorioSelecionado] = useState(null);
          const [versaoSelecionada, setVersaoSelecionada] = useState(null);
          const [editandoPergunta, setEditandoPergunta] = useState(null);
          const [editedState, setEditedState] = useState({});
          const fileInputRef = useRef(null);
          
          const markAsEdited = () => {
            if (relatorioSelecionado) {
              setEditedState(prev => ({ ...prev, [relatorioSelecionado]: true }));
            }
          };

          const adicionarRelatorio = () => { /* ... (same as before) ... */ };
          const removerRelatorio = (idParaRemover) => { /* ... (same as before) ... */ };
          
          const handleVersionChange = (newVersionStr) => {
            if (!relatorioSelecionado) return;

            setConfig(prev => {
                const newState = JSON.parse(JSON.stringify(prev));
                const report = newState.relatorios[relatorioSelecionado];
                
                if (report && report.versoes[versaoSelecionada]) {
                    const versionData = report.versoes[versaoSelecionada];
                    // Only rename if the new key is different and not empty
                    if (newVersionStr && newVersionStr !== versaoSelecionada) {
                        delete report.versoes[versaoSelecionada];
                        report.versoes[newVersionStr] = versionData;
                    }
                    report.versao_atual = newVersionStr;
                }
                
                return newState;
            });
            // Update the selected version state only if the new string is valid
            if (newVersionStr) {
                setVersaoSelecionada(newVersionStr);
            }
            markAsEdited();
          };
          
          const atualizarVersao = (updates) => {
            setConfig(prev => {
                const newState = JSON.parse(JSON.stringify(prev));
                const relatorio = newState.relatorios[relatorioSelecionado];
                if (relatorio && relatorio.versoes[versaoSelecionada]) {
                    relatorio.versoes[versaoSelecionada] = { ...relatorio.versoes[versaoSelecionada], ...updates };
                }
                return newState;
            });
            markAsEdited();
          };

          const atualizarPergunta = (perguntaId, updates) => {
              const perguntasAtuais = config.relatorios[relatorioSelecionado].versoes[versaoSelecionada].perguntas;
              const atualizarRecursivo = (perguntas) => perguntas.map(p => {
                  if (p.id === perguntaId) return { ...p, ...updates };
                  return p;
              });
              atualizarVersao({ perguntas: atualizarRecursivo(perguntasAtuais) });
          };
          
          const adicionarPergunta = () => { /* ... (same as before) ... */ };
          const removerPergunta = (perguntaId) => { /* ... (same as before) ... */ };
          const exportarJSON = () => { /* ... (same as before) ... */ };
          const importarJSON = (event) => { /* ... (same as before) ... */ };
          
          const relatorioAtivo = config.relatorios[relatorioSelecionado];
          const versaoAtual = relatorioAtivo ? relatorioAtivo.versoes[versaoSelecionada] : null;

          const encontrarPergunta = (id) => {
            if (!versaoAtual) return null;
            return versaoAtual.perguntas.find(p => p.id === id);
          }

          const perguntaParaEditar = encontrarPergunta(editandoPergunta);

          const renderEditorPergunta = (pergunta) => { /* ... (same as before, with button fixes) ... */ };

          const renderPergunta = (p) => (
            <div key={p.id} className="bg-white border rounded p-3 mb-3 hover:shadow-md transition-shadow">
                <div className="flex items-center justify-between">
                    <div className="flex-1 cursor-pointer" onClick={() => setEditandoPergunta(p.id)}>
                        <span className="font-medium">{p.texto}</span>
                        {p.obrigatorio && <span className="text-red-500 text-sm ml-2">*Obrigatório</span>}
                        <div className="text-xs text-gray-500 mt-1">{TIPOS_CAMPO.find(t => t.id === p.tipo)?.nome || p.tipo}</div>
                    </div>
                    <div className="flex items-center gap-2">
                        <button onClick={() => setEditandoPergunta(p.id)} className="p-1 text-blue-500 hover:text-blue-700"><Icon name="edit" size={16} /></button>
                        <button onClick={() => removerPergunta(p.id)} className="p-1 text-red-500 hover:text-red-700"><Icon name="trash-2" size={16}/></button>
                    </div>
                </div>
            </div>
          );
          
          return (
            <div className="min-h-screen bg-gray-50">
                <CustomModal modal={modal} setModal={setModal} />
                {perguntaParaEditar && renderEditorPergunta(perguntaParaEditar)}
                <div className="bg-red-700 text-white p-4 shadow-lg"> {/* ... Header ... */} </div>
                <div className="max-w-7xl mx-auto p-4">
                    {!relatorioSelecionado ? (
                        <div className="bg-white rounded-lg shadow p-6"> {/* ... Tela Inicial ... */} </div>
                    ) : (
                        <div className="grid grid-cols-12 gap-4">
                            <div className="col-span-3"> {/* ... Sidebar ... */} </div>
                            <div className="col-span-9">
                                <div className="bg-white rounded-lg shadow p-4 mb-4">
                                     <input type="text" value={versaoAtual?.titulo || ''} onChange={(e) => atualizarVersao({ titulo: e.target.value })} className="text-2xl font-bold w-full border-b-2 border-transparent hover:border-gray-300 focus:border-red-500 outline-none mb-2" />
                                     <textarea value={versaoAtual?.descricao || ''} onChange={(e) => atualizarVersao({ descricao: e.target.value })} className="text-gray-600 w-full border border-transparent hover:border-gray-300 focus:border-red-500 outline-none rounded p-1 mb-2" rows={2} />
                                     <div>
                                        <label className="text-sm font-medium text-gray-700">Versão Atual do Relatório</label>
                                        <input type="text" value={relatorioAtivo?.versao_atual || ''} onChange={(e) => handleVersionChange(e.target.value)} className="w-full p-2 mt-1 border rounded" />
                                     </div>
                                </div>
                                <div className="bg-white rounded-lg shadow p-4">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-semibold text-xl">Perguntas</h3>
                                        <button onClick={adicionarPergunta} className="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 flex items-center gap-2"><Icon name="plus" size={18}/> Adicionar Pergunta</button>
                                    </div>
                                    {versaoAtual?.perguntas && versaoAtual.perguntas.length > 0 ? versaoAtual.perguntas.map(renderPergunta) : <p className="text-center text-gray-500 py-8">Nenhuma pergunta criada.</p>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            </div>
          );
        };
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<EditorWYSIWYG />);
    </script>
</body>
</html>
