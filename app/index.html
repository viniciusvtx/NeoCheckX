<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#DC2626">
    <title>NeoCheckX - Relatórios</title>
    <link rel="icon" href="/NeoCheckX/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/NeoCheckX/app/manifest.json">
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, color = 'currentColor', size = 24, className = '' }) => {
            const iconNameKebab = name.replace(/([a-z0-9]|(?=[A-Z]))([A-Z])/g, '$1-$2').toLowerCase();
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name, size, color, className]);

            if (!window.lucide || !lucide.icons[iconNameKebab]) {
                return <span className={`icon-placeholder ${className}`} style={{ width: size, height: size, display: 'inline-block' }} />;
            }
            const iconSvg = lucide.icons[iconNameKebab].toSvg({ color, 'stroke-width': 2, width: size, height: size });
            return <span className={`inline-flex justify-center items-center ${className}`} dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };
        
        const CustomModal = ({ modal, setModal }) => {
            if (!modal) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[100]">
                    <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 text-center">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">{modal.title || 'NeoCheckX'}</h3>
                        <p className="text-gray-700 whitespace-pre-line mb-6">{modal.message}</p>
                        <div className="flex gap-4">
                            {modal.confirm ? (
                                <>
                                    <button onClick={() => { if(modal.onCancel) modal.onCancel(); setModal(null); }} className="flex-1 p-2 bg-gray-300 rounded hover:bg-gray-400">Cancelar</button>
                                    <button onClick={() => { if(modal.onConfirm) modal.onConfirm(); setModal(null); }} className="flex-1 p-2 bg-red-600 text-white rounded hover:bg-red-700">Confirmar</button>
                                </>
                            ) : (
                                <button onClick={() => setModal(null)} className="w-full p-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        
        const useIndexedDB = () => {
          const dbName = 'RelatoriosTecnicosDB';
          const dbVersion = 1;

          const openDB = () => {
            return new Promise((resolve, reject) => {
              const request = indexedDB.open(dbName, dbVersion);
              request.onerror = () => reject(request.error);
              request.onsuccess = () => resolve(request.result);
              request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('sessoes')) db.createObjectStore('sessoes', { keyPath: 'id' });
                if (!db.objectStoreNames.contains('configuracoes')) db.createObjectStore('configuracoes', { keyPath: 'chave' });
              };
            });
          };

          const dbRequest = (storeName, mode, action) => {
            return new Promise(async (resolve, reject) => {
                const db = await openDB();
                const transaction = db.transaction([storeName], mode);
                const store = transaction.objectStore(storeName);
                action(store);
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject(transaction.error);
            });
          };

          const salvarSessao = (sessao) => dbRequest('sessoes', 'readwrite', store => store.put(sessao));
          const deletarSessao = (id) => dbRequest('sessoes', 'readwrite', store => store.delete(id));
          const salvarConfiguracao = (chave, valor) => dbRequest('configuracoes', 'readwrite', store => store.put({ chave, valor }));

          const carregarSessoes = () => new Promise(async (resolve, reject) => {
            const db = await openDB();
            const request = db.transaction(['sessoes'], 'readonly').objectStore('sessoes').getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
          });
          
          const carregarConfiguracao = (chave) => new Promise(async (resolve, reject) => {
            const db = await openDB();
            const request = db.transaction(['configuracoes'], 'readonly').objectStore('configuracoes').get(chave);
            request.onsuccess = () => resolve(request.result?.valor);
            request.onerror = () => reject(request.error);
          });

          return { salvarSessao, carregarSessoes, deletarSessao, salvarConfiguracao, carregarConfiguracao };
        };
        
        const App = () => {
            const [tela, setTela] = useState(window.location.hash.replace('#', '') || 'inicio');
            const [sessoes, setSessoes] = useState([]);
            const [sessaoAtual, setSessaoAtual] = useState(null);
            const [respostas, setRespostas] = useState({});
            const [configs, setConfigs] = useState({
                dados_tecnicos: { nome_equipe: '', tecnico_interno: '', placa_veiculo: '', tipo_veiculo: '' }
            });
            const db = useIndexedDB();
            const [relatoriosConfig, setRelatoriosConfig] = useState(null);
            const [modal, setModal] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const carregarTudo = async () => {
                    setIsLoading(true);
                    try {
                        const configsSalvas = await db.carregarConfiguracao('dados_tecnicos');
                        if (configsSalvas) {
                           setConfigs(prev => ({...prev, dados_tecnicos: {...prev.dados_tecnicos, ...configsSalvas} }));
                        }
                        
                        const response = await fetch('/NeoCheckX/relatorios.json?t=' + new Date().getTime());
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const data = await response.json();
                        setRelatoriosConfig(data);
                    } catch (error) {
                        console.error("Erro ao carregar configurações:", error);
                        setModal({ title: 'Erro de Configuração', message: 'Não foi possível carregar o arquivo de configuração dos relatórios.' });
                    } finally {
                        setIsLoading(false);
                    }
                };
                carregarTudo();

                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '') || 'inicio';
                    if (!hash.startsWith('formulario')) setSessaoAtual(null); // Limpa sessão se não for formulário
                    setTela(hash);
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const mudarTela = (novaTela) => {
                window.location.hash = novaTela;
            };

            const iniciarNovaSessao = (tipoRelatorio) => {
                const relatorio = relatoriosConfig.relatorios[tipoRelatorio];
                const versaoAtual = relatorio.versao_atual;
                const estrutura = relatorio.versoes[versaoAtual];
                
                const agora = new Date();
                const id = `sessao_${agora.getTime()}_${tipoRelatorio}`;
                
                const novaSessao = {
                    id, tipo_relatorio: tipoRelatorio, versao_relatorio: versaoAtual,
                    versao_app: relatoriosConfig.versao_atual, status: 'em_andamento',
                    timestamps: { criacao: agora.toISOString(), ultima_edicao: agora.toISOString(), finalizacao: null },
                    tempo_gasto: { total_segundos: 0, sessoes: [] },
                    respostas: {}, estrutura
                };
                
                setSessaoAtual(novaSessao);
                setRespostas({});
                db.salvarSessao(novaSessao);
                mudarTela(`formulario?id=${id}`);
            };

            const reabrirSessao = async (id) => {
                const sessoesSalvas = await db.carregarSessoes();
                const sessao = sessoesSalvas.find(s => s.id === id);
                if(sessao) {
                    setSessaoAtual(sessao);
                    setRespostas(sessao.respostas || {});
                    mudarTela(`formulario?id=${id}`);
                }
            };

            const salvarConfiguracoes = async () => { /* ... */ };

            // Renderização principal
            if (isLoading) { /* ... */ }
            
            if (tela === 'inicio') { /* ... */ }

            if (tela === 'novo_relatorio') {
                return (
                  <div className="min-h-screen bg-gray-50 p-4">
                    <div className="max-w-2xl mx-auto">
                      <div className="mb-6"><button onClick={() => mudarTela('inicio')} className="text-red-600 hover:text-red-700 mb-4">← Voltar</button>
                        <h2 className="text-2xl font-bold text-gray-800">Selecione o tipo de relatório</h2>
                      </div>
                      <div className="space-y-4">
                        {relatoriosConfig && Object.entries(relatoriosConfig.relatorios).map(([id, rel]) => {
                          const versao = rel.versoes[rel.versao_atual];
                          return (
                            <button key={id} onClick={() => iniciarNovaSessao(id)} className="w-full p-6 bg-white rounded-lg shadow hover:shadow-lg transition-shadow text-left">
                              <h3 className="text-xl font-semibold text-gray-800 mb-2">{versao.titulo}</h3>
                              <p className="text-gray-600 text-sm mb-3">{versao.descricao}</p>
                              <div className="text-xs text-gray-500">Versão {rel.versao_atual} • {versao.perguntas.length} perguntas</div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                );
            }

            if (tela === 'sessoes') {
                return (
                    <div className="min-h-screen bg-gray-50 p-4">
                        <div className="max-w-2xl mx-auto">
                           <div className="mb-6"><button onClick={() => mudarTela('inicio')} className="text-red-600 hover:text-red-700 mb-4">← Voltar</button>
                                <h2 className="text-2xl font-bold text-gray-800">Sessões Salvas</h2>
                           </div>
                            {sessoes.length === 0 ? (
                                <p className="text-center text-gray-500 py-12">Nenhuma sessão salva.</p>
                            ) : (
                                <div className="space-y-4">
                                {sessoes.map(sessao => {
                                    const tipoRelatorio = relatoriosConfig.relatorios[sessao.tipo_relatorio];
                                    if (!tipoRelatorio) return null;
                                    const estrutura = tipoRelatorio.versoes[sessao.versao_relatorio];
                                    return (
                                        <div key={sessao.id} className="bg-white p-4 rounded-lg shadow">
                                            <h3 className="font-semibold text-gray-800">{estrutura.titulo}</h3>
                                            <p className="text-sm text-gray-500">{new Date(sessao.timestamps.criacao).toLocaleString('pt-BR')}</p>
                                            <button onClick={() => reabrirSessao(sessao.id)} className="w-full mt-3 p-2 bg-red-600 text-white rounded hover:bg-red-700">
                                                {sessao.status === 'finalizado' ? 'Visualizar' : 'Continuar'}
                                            </button>
                                        </div>
                                    )
                                })}
                                </div>
                            )}
                        </div>
                    </div>
                )
            }
            
            if (tela === 'configuracoes') { /* ... */ }

            if (tela.startsWith('formulario')) {
                // Implementação da Tela de Formulário
                return <div className="p-4"><h1>Formulário da Sessão: {sessaoAtual?.id || 'N/A'}</h1><button onClick={() => mudarTela('inicio')}>Voltar</button></div>;
            }

            return <div className="flex items-center justify-center h-screen">Página não encontrada.</div>;
        };
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/NeoCheckX/app/service-worker.js', { scope: '/NeoCheckX/app/' })
                    .then(reg => console.log('Service Worker registrado com sucesso.'))
                    .catch(err => console.error('Erro ao registrar SW:', err));
            });
        }
    </script>
</body>
</html>
