// Hook para gerenciar IndexedDB
const useIndexedDB = () => {
  const dbName = 'RelatoriosTecnicosDB';
  const dbVersion = 1;

  const openDB = () => {
    return new Promise((resolve, reject) => {
      const request = indexedDB.open(dbName, dbVersion);
      
      request.onerror = () => reject(request.error);
      request.onsuccess = () => resolve(request.result);
      
      request.onupgradeneeded = (event) => {
        const db = event.target.result;
        if (!db.objectStoreNames.contains('sessoes')) {
          db.createObjectStore('sessoes', { keyPath: 'id' });
        }
        if (!db.objectStoreNames.contains('configuracoes')) {
          db.createObjectStore('configuracoes', { keyPath: 'chave' });
        }
      };
    });
  };

  const salvarSessao = async (sessao) => {
    const db = await openDB();
    const transaction = db.transaction(['sessoes'], 'readwrite');
    const store = transaction.objectStore('sessoes');
    store.put(sessao);
    return new Promise((resolve, reject) => {
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject(transaction.error);
    });
  };

  const carregarSessoes = async () => {
    const db = await openDB();
    const transaction = db.transaction(['sessoes'], 'readonly');
    const store = transaction.objectStore('sessoes');
    const request = store.getAll();
    return new Promise((resolve, reject) => {
      request.onsuccess = () => resolve(request.result);
      request.onerror = () => reject(request.error);
    });
  };

  const deletarSessao = async (id) => {
    const db = await openDB();
    const transaction = db.transaction(['sessoes'], 'readwrite');
    const store = transaction.objectStore('sessoes');
    store.delete(id);
    return new Promise((resolve, reject) => {
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject(transaction.error);
    });
  };

  const salvarConfiguracao = async (chave, valor) => {
    const db = await openDB();
    const transaction = db.transaction(['configuracoes'], 'readwrite');
    const store = transaction.objectStore('configuracoes');
    store.put({ chave, valor });
    return new Promise((resolve, reject) => {
      transaction.oncomplete = () => resolve();
      transaction.onerror = () => reject(transaction.error);
    });
  };

  const carregarConfiguracao = async (chave) => {
    const db = await openDB();
    const transaction = db.transaction(['configuracoes'], 'readonly');
    const store = transaction.objectStore('configuracoes');
    const request = store.get(chave);
    return new Promise((resolve, reject) => {
      request.onsuccess = () => resolve(request.result?.valor);
      request.onerror = () => reject(request.error);
    });
  };

  return { salvarSessao, carregarSessoes, deletarSessao, salvarConfiguracao, carregarConfiguracao };
};

const App = () => {
  const [tela, setTela] = useState('inicio'); // inicio, novo_relatorio, sessoes, formulario, configuracoes
  const [sessoes, setSessoes] = useState([]);
  const [sessaoAtual, setSessaoAtual] = useState(null);
  const [respostas, setRespostas] = useState({});
  const [mostrarAjuda, setMostrarAjuda] = useState(null);
  const [mostrarApenasPendentes, setMostrarApenasPendentes] = useState(false);
  const [salvando, setSalvando] = useState(false);
  const [tempoGasto, setTempoGasto] = useState(0);
  const [configs, setConfigs] = useState({
    dados_tecnicos: {
      nome_equipe: '',
      tecnico_interno: '',
      placa_veiculo: ''
    }
  });
  const [editandoLocalizacao, setEditandoLocalizacao] = useState(false);
  const [modoManualHeader, setModoManualHeader] = useState(false);
  
  const db = useIndexedDB();
  const intervaloTempo = useRef(null);
  const inicioSessaoAtual = useRef(null);

  // Carregar configurações ao iniciar
  useEffect(() => {
    const carregarConfigs = async () => {
      const configsSalvas = await db.carregarConfiguracao('dados_tecnicos');
      if (configsSalvas) {
        setConfigs({ dados_tecnicos: configsSalvas });
      }
    };
    carregarConfigs();
  }, []);

  // Cronômetro
  useEffect(() => {
    if (tela === 'formulario' && sessaoAtual) {
      inicioSessaoAtual.current = Date.now();
      intervaloTempo.current = setInterval(() => {
        setTempoGasto(prev => prev + 1);
      }, 1000);

      return () => {
        if (intervaloTempo.current) {
          clearInterval(intervaloTempo.current);
        }
      };
    }
  }, [tela, sessaoAtual]);

  // Auto-save
  useEffect(() => {
    if (sessaoAtual && Object.keys(respostas).length > 0) {
      const salvar = async () => {
        setSalvando(true);
        const sessaoAtualizada = {
          ...sessaoAtual,
          respostas,
          tempo_gasto: {
            ...sessaoAtual.tempo_gasto,
            total_segundos: (sessaoAtual.tempo_gasto?.total_segundos || 0) + tempoGasto
          },
          timestamps: {
            ...sessaoAtual.timestamps,
            ultima_edicao: new Date().toISOString()
          }
        };
        await db.salvarSessao(sessaoAtualizada);
        setSessaoAtual(sessaoAtualizada);
        setTimeout(() => setSalvando(false), 500);
      };
      const debounce = setTimeout(salvar, 1000);
      return () => clearTimeout(debounce);
    }
  }, [respostas]);

  const formatarTempo = (segundos) => {
    const horas = Math.floor(segundos / 3600);
    const minutos = Math.floor((segundos % 3600) / 60);
    const segs = segundos % 60;
    if (horas > 0) return `${horas}h ${minutos}min`;
    if (minutos > 0) return `${minutos}min ${segs}s`;
    return `${segs}s`;
  };

  const iniciarNovaSessao = (tipoRelatorio) => {
    const relatorio = RELATORIOS_CONFIG.relatorios[tipoRelatorio];
    const versaoAtual = relatorio.versao_atual;
    const estrutura = relatorio.versoes[versaoAtual];
    
    const agora = new Date();
    const id = `sessao_${agora.getTime()}_${tipoRelatorio}`;
    
    const novaSessao = {
      id,
      tipo_relatorio: tipoRelatorio,
      versao_relatorio: versaoAtual,
      versao_app: RELATORIOS_CONFIG.versao_atual,
      status: 'em_andamento',
      timestamps: {
        criacao: agora.toISOString(),
        ultima_edicao: agora.toISOString(),
        finalizacao: null
      },
      tempo_gasto: {
        total_segundos: 0,
        sessoes: []
      },
      respostas: {},
      estrutura
    };
    
    setSessaoAtual(novaSessao);
    
    // Pré-preencher com valores padrão das configurações
    const respostasIniciais = {};
    estrutura.perguntas.forEach(pergunta => {
      if (pergunta.valor_padrao_config && configs.dados_tecnicos) {
        const campoConfig = pergunta.valor_padrao_config.split('.')[1];
        if (configs.dados_tecnicos[campoConfig]) {
          respostasIniciais[pergunta.id] = {
            valor: configs.dados_tecnicos[campoConfig],
            timestamp: agora.toISOString()
          };
        }
      }
    });
    
    setRespostas(respostasIniciais);
    setTempoGasto(0);
    setTela('formulario');
  };

  const reabrirSessao = async (id) => {
    const sessoesSalvas = await db.carregarSessoes();
    const sessao = sessoesSalvas.find(s => s.id === id);
    if (sessao) {
      setSessaoAtual(sessao);
      setRespostas(sessao.respostas || {});
      setTempoGasto(0);
      setTela('formulario');
    }
  };

  const obterLocalizacao = () => {
    if ('geolocation' in navigator) {
      navigator.geolocation.getCurrentPosition(
        (position) => {
          setRespostas(prev => ({
            ...prev,
            localizacao_atendimento: {
              valor: {
                latitude: position.coords.latitude,
                longitude: position.coords.longitude,
                precisao: position.coords.accuracy,
                metodo_obtencao: 'automatico',
                editado_manualmente: false,
                timestamp: new Date().toISOString()
              },
              timestamp: new Date().toISOString()
            }
          }));
        },
        (error) => {
          alert('Erro ao obter localização: ' + error.message);
        }
      );
    } else {
      alert('Geolocalização não disponível neste dispositivo');
    }
  };

  const renderizarCampo = (pergunta, nivel = 0) => {
    const resposta = respostas[pergunta.id];
    const valor = resposta?.valor;
    const temErro = pergunta.obrigatorio && !valor;
    
    if (mostrarApenasPendentes && !temErro && valor) {
      return null;
    }

    const atualizarResposta = (novoValor) => {
      setRespostas(prev => ({
        ...prev,
        [pergunta.id]: {
          valor: novoValor,
          timestamp: new Date().toISOString()
        }
      }));
    };

    const renderizarAjuda = () => {
      if (!pergunta.ajuda) return null;
      return (
        <button
          onClick={() => setMostrarAjuda(pergunta)}
          className="ml-2 text-blue-500 hover:text-blue-700"
        >
          <HelpCircle size={18} />
        </button>
      );
    };

    const renderizarIconeStatus = () => {
      if (temErro) return <AlertCircle size={18} className="text-orange-500" />;
      if (valor) return <CheckCircle size={18} className="text-green-500" />;
      if (!pergunta.obrigatorio) return <Circle size={18} className="text-gray-400" />;
      return null;
    };

    let campoRender = null;

    switch (pergunta.tipo) {

            type="text"
            value={valor || ''}
            onChange={(e) => atualizarResposta(e.target.value)}

        break;

      case 'texto_longo':

          />

        break;

      case 'numero':
        campoRender = (

            type="number"

        break;

      case 'sim_nao':
        campoRender = (
          <div className="flex gap-4">
            <button
              onClick={() => atualizarResposta('Sim')}
              className={`flex-1 p-3 border rounded ${valor === 'Sim' ? 'bg-green-500 text-white border-green-600' : 'bg-white border-gray-300'}`}
            >
              Sim
            </button>
            <button
              onClick={() => atualizarResposta('Não')}
              className={`flex-1 p-3 border rounded ${valor === 'Não' ? 'bg-red-500 text-white border-red-600' : 'bg-white border-gray-300'}`}
            >
              Não
            </button>
          </div>
        );
        break;

      case 'escolha_unica':
        campoRender = (
          <div className="space-y-2">
            {pergunta.opcoes.map(opcao => (
              <button
                key={opcao}
                onClick={() => atualizarResposta(opcao)}
                className={`w-full p-3 border rounded text-left ${valor === opcao ? 'bg-blue-500 text-white border-blue-600' : 'bg-white border-gray-300'}`}
              >
                {opcao}
              </button>
            ))}
          </div>
        );
        break;

      case 'localizacao':
        if (editandoLocalizacao) {
          campoRender = (
            <div className="space-y-3 p-4 bg-gray-50 rounded">
              <div>
                <label className="block text-sm mb-1">Latitude:</label>
                <input
                  type="number"
                  step="any"
                  value={valor?.latitude || ''}
                  onChange={(e) => atualizarResposta({
                    ...valor,
                    latitude: parseFloat(e.target.value),
                    metodo_obtencao: 'manual',
                    editado_manualmente: true

                  className="w-full p-2 border rounded"
                />
              </div>
              <div>
                <label className="block text-sm mb-1">Longitude:</label>

        } else {

            <div className="space-y-3 p-4 bg-gray-50 rounded">

                    <div>

                    </div>
                    <div>

                    <div>

              <div className="flex gap-2">

                    [pergunta.campos_entrada[0].id]: parseFloat(e.target.value) || ''
                  })}
                  className="w-full p-2 border rounded"
                />
              </div>
              <div>
                <label className="block text-sm mb-1">{pergunta.campos_entrada[1].texto}</label>
                <input
                  type="number"
                  step="any"
                  value={entrada2}
                  onChange={(e) => atualizarResposta({
                    ...valor,
                    [pergunta.campos_entrada[1].id]: parseFloat(e.target.value) || ''
                  })}
                  className="w-full p-2 border rounded"
                />
              </div>
            </div>
            {resultado !== null && (
              <div className="p-3 bg-blue-100 rounded text-center">
                <span className="font-semibold text-lg">
                  Metragem calculada: {resultado.toFixed(2)} {pergunta.unidade}
                </span>
              </div>
            )}
          </div>
        );
        break;
    }

    return (
      <div key={pergunta.id} className={`mb-6 ${nivel > 0 ? 'ml-6 pl-4 border-l-2 border-gray-300' : ''}`}>
        <div className="flex items-center gap-2 mb-2">
          {renderizarIconeStatus()}
          <label className="font-medium">
            {pergunta.texto}
            {pergunta.obrigatorio && <span className="text-red-500 ml-1">*</span>}
          </label>
          {renderizarAjuda()}
        </div>
        {campoRender}
        
        {/* Renderizar perguntas condicionais */}
        {pergunta.perguntas_condicionais && valor && pergunta.perguntas_condicionais[valor] && (
          <div className="mt-4">
            {pergunta.perguntas_condicionais[valor].map(subPergunta => 
              renderizarCampo(subPergunta, nivel + 1)
            )}
          </div>
        )}
      </div>
    );
  };

  const gerarRelatorio = () => {
    // Verificar campos obrigatórios
    const camposObrigatorios = [];
    const verificarCampos = (perguntas) => {
      perguntas.forEach(p => {
        if (p.obrigatorio && !respostas[p.id]?.valor) {
          camposObrigatorios.push(p.texto);
        }
        // Verificar condicionais
        if (p.perguntas_condicionais && respostas[p.id]?.valor) {
          const subPerguntas = p.perguntas_condicionais[respostas[p.id].valor];
          if (subPerguntas) verificarCampos(subPerguntas);
        }
      });
    };
    
    verificarCampos(sessaoAtual.estrutura.perguntas);
    
    if (camposObrigatorios.length > 0) {
      alert(`Campos obrigatórios não preenchidos:\n\n• ${camposObrigatorios.join('\n• ')}`);
      setMostrarApenasPendentes(true);
      return;
    }

    // Gerar texto do relatório
    let relatorio = '==========================================\n';
    relatorio += `RELATÓRIO: ${sessaoAtual.estrutura.titulo.toUpperCase()}\n`;
    relatorio += '==========================================\n\n';
    relatorio += 'INFORMAÇÕES DA SESSÃO:\n';
    relatorio += `  Iniciado em: ${new Date(sessaoAtual.timestamps.criacao).toLocaleString('pt-BR')}\n`;
    relatorio += `  Finalizado em: ${new Date().toLocaleString('pt-BR')}\n`;
    relatorio += `  Tempo total gasto: ${formatarTempo((sessaoAtual.tempo_gasto?.total_segundos || 0) + tempoGasto)}\n`;
    relatorio += `  Técnico: ${respostas.tecnico_interno?.valor || 'N/A'}\n`;
    relatorio += `  Equipe: ${respostas.nome_equipe?.valor || 'N/A'}\n\n`;

    const formatarResposta = (pergunta, resposta, nivel = 0) => {
      const indent = '  '.repeat(nivel);
      let texto = '';
      
      if (!resposta?.valor) return texto;
      
      texto += `${indent}${pergunta.texto}: `;
      
      switch (pergunta.tipo) {
        case 'localizacao':
          const loc = resposta.valor;
          texto += `\n${indent}  Latitude: ${loc.latitude?.toFixed(6)}\n`;
          texto += `${indent}  Longitude: ${loc.longitude?.toFixed(6)}\n`;
          texto += `${indent}  Precisão: ${loc.precisao?.toFixed(0)}m\n`;
          texto += `${indent}  Método: ${loc.editado_manualmente ? 'Editado Manualmente' : 'Obtido Automaticamente'}\n`;
          break;
        
        case 'api_dinamica':
          texto += `\n${indent}  Protocolo: ${resposta.valor.numero_protocolo}\n`;
          texto += `${indent}  Origem: ${resposta.valor.origem === 'api' ? 'Sincronizado' : 'Manual'}\n`;
          if (resposta.valor.dados) {
            texto += `${indent}  Dados:\n`;
            resposta.valor.dados.split('\n').forEach(linha => {
              texto += `${indent}    ${linha}\n`;
            });
          }
          break;
        
        case 'calculado':
          const v = resposta.valor;
          const resultado = Math.abs(v[pergunta.campos_entrada[1].id] - v[pergunta.campos_entrada[0].id]);
          texto += `${resultado.toFixed(2)} ${pergunta.unidade}\n`;
          texto += `${indent}  ${pergunta.campos_entrada[0].texto}: ${v[pergunta.campos_entrada[0].id]}\n`;
          texto += `${indent}  ${pergunta.campos_entrada[1].texto}: ${v[pergunta.campos_entrada[1].id]}\n`;
          break;
        
        default:
          texto += `${resposta.valor}\n`;
      }
      
      // Adicionar perguntas condicionais
      if (pergunta.perguntas_condicionais && pergunta.perguntas_condicionais[resposta.valor]) {
        pergunta.perguntas_condicionais[resposta.valor].forEach(subPergunta => {
          const subResposta = respostas[subPergunta.id];
          if (subResposta) {
            texto += formatarResposta(subPergunta, subResposta, nivel + 1);
          }
        });
      }
      
      return texto;
    };

    sessaoAtual.estrutura.perguntas.forEach(pergunta => {
      const resposta = respostas[pergunta.id];
      if (resposta) {
        relatorio += formatarResposta(pergunta, resposta);
      }
    });

    relatorio += '\n==========================================\n';
    relatorio += 'FIM DO RELATÓRIO\n';
    relatorio += '==========================================';

    // Copiar para clipboard
    navigator.clipboard.writeText(relatorio).then(() => {
      alert('✓ Relatório copiado para a área de transferência!');
      
      // Atualizar sessão como finalizada
      const sessaoFinalizada = {
        ...sessaoAtual,
        status: 'finalizado',
        timestamps: {
          ...sessaoAtual.timestamps,
          finalizacao: new Date().toISOString()
        },
        tempo_gasto: {
          ...sessaoAtual.tempo_gasto,
          total_segundos: (sessaoAtual.tempo_gasto?.total_segundos || 0) + tempoGasto
        }
      };
      
      db.salvarSessao(sessaoFinalizada);
      setTela('inicio');
    });
  };

  const calcularProgresso = () => {
    if (!sessaoAtual) return { percentual: 0, respondidas: 0, total: 0 };
    
    let total = 0;
    let respondidas = 0;
    
    const contarPerguntas = (perguntas) => {
      perguntas.forEach(p => {
        total++;
        if (respostas[p.id]?.valor) {
          respondidas++;
          // Contar perguntas condicionais ativas
          if (p.perguntas_condicionais && p.perguntas_condicionais[respostas[p.id].valor]) {
            contarPerguntas(p.perguntas_condicionais[respostas[p.id].valor]);
          }
        }
      });
    };
    
    contarPerguntas(sessaoAtual.estrutura.perguntas);
    
    return {
      percentual: total > 0 ? Math.round((respondidas / total) * 100) : 0,
      respondidas,
      total
    };
  };

  // Tela Inicial
  if (tela === 'inicio') {
    return (
      <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
        <div className="max-w-md mx-auto pt-20">
          <div className="text-center mb-12">
            <FileText size={64} className="mx-auto mb-4 text-indigo-600" />
            <h1 className="text-3xl font-bold text-gray-800 mb-2">Relatórios Técnicos</h1>
            <p className="text-gray-600">Sistema offline para visitas técnicas</p>
          </div>

          <div className="space-y-4">
            <button
              onClick={() => setTela('novo_relatorio')}
              className="w-full p-4 bg-indigo-600 text-white rounded-lg shadow-lg hover:bg-indigo-700 flex items-center justify-center gap-3 text-lg font-semibold"
            >
              <Plus size={24} />
              Nova Sessão
            </button>

            <button
              onClick={async () => {
                const sessoesSalvas = await db.carregarSessoes();
                setSessoes(sessoesSalvas);
                setTela('sessoes');
              }}
              className="w-full p-4 bg-white text-indigo-600 rounded-lg shadow-lg hover:bg-gray-50 flex items-center justify-center gap-3 text-lg font-semibold border-2 border-indigo-600"
            >
              <FolderOpen size={24} />
              Reabrir Sessão
            </button>

            <button
              onClick={() => setTela('configuracoes')}
              className="w-full p-4 bg-white text-gray-700 rounded-lg shadow hover:bg-gray-50 flex items-center justify-center gap-3"
            >
              <Settings size={20} />
              Configurações
            </button>
          </div>

          <div className="mt-8 text-center text-sm text-gray-500">
            Versão {RELATORIOS_CONFIG.versao_atual}
          </div>
        </div>
      </div>
    );
  }

  // Tela Novo Relatório
  if (tela === 'novo_relatorio') {
    return (
      <div className="min-h-screen bg-gray-50 p-4">
        <div className="max-w-2xl mx-auto">
          <div className="mb-6">
            <button
              onClick={() => setTela('inicio')}
              className="text-indigo-600 hover:text-indigo-700 mb-4"
            >
              ← Voltar
            </button>
            <h2 className="text-2xl font-bold text-gray-800">Selecione o tipo de relatório</h2>
          </div>

          <div className="space-y-4">
            {Object.entries(RELATORIOS_CONFIG.relatorios).map(([id, relatorio]) => {
              const estrutura = relatorio.versoes[relatorio.versao_atual];
              return (
                <button
                  key={id}
                  onClick={() => iniciarNovaSessao(id)}
                  className="w-full p-6 bg-white rounded-lg shadow hover:shadow-lg transition-shadow text-left"
                >
                  <h3 className="text-xl font-semibold text-gray-800 mb-2">{estrutura.titulo}</h3>
                  <p className="text-gray-600 text-sm mb-3">{estrutura.descricao}</p>
                  <div className="text-xs text-gray-500">
                    Versão {relatorio.versao_atual} • {estrutura.perguntas.length} perguntas
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  // Tela Sessões Salvas
  if (tela === 'sessoes') {
    return (
      <div className="min-h-screen bg-gray-50 p-4">
        <div className="max-w-2xl mx-auto">
          <div className="mb-6">
            <button
              onClick={() => setTela('inicio')}
              className="text-indigo-600 hover:text-indigo-700 mb-4"
            >
              ← Voltar
            </button>
            <h2 className="text-2xl font-bold text-gray-800">Sessões Salvas</h2>
          </div>

          {sessoes.length === 0 ? (
            <div className="text-center py-12 text-gray-500">
              <FileText size={48} className="mx-auto mb-4 opacity-50" />
              <p>Nenhuma sessão salva</p>
            </div>
          ) : (
            <div className="space-y-4">
              {sessoes.map(sessao => {
                const tipoRelatorio = RELATORIOS_CONFIG.relatorios[sessao.tipo_relatorio];
                const estrutura = tipoRelatorio.versoes[sessao.versao_relatorio];
                const progresso = sessao.status === 'finalizado' ? 100 : 
                  Math.round((Object.keys(sessao.respostas || {}).length / estrutura.perguntas.length) * 100);

                return (
                  <div key={sessao.id} className="bg-white p-4 rounded-lg shadow">
                    <div className="flex justify-between items-start mb-3">
                      <div>
                        <h3 className="font-semibold text-gray-800">{estrutura.titulo}</h3>
                        <p className="text-sm text-gray-500">
                          {new Date(sessao.timestamps.criacao).toLocaleString('pt-BR')}
                        </p>
                      </div>
                      <button
                        onClick={async () => {
                          if (confirm('Deseja realmente apagar esta sessão?')) {
                            await db.deletarSessao(sessao.id);
                            const novasSessoes = sessoes.filter(s => s.id !== sessao.id);
                            setSessoes(novasSessoes);
                          }
                        }}
                        className="text-red-500 hover:text-red-700"
                      >
                        <Trash2 size={18} />
                      </button>
                    </div>

                    <div className="mb-3">
                      <div className="flex justify-between text-sm text-gray-600 mb-1">
                        <span>Progresso</span>
                        <span>{progresso}%</span>
                      </div>
                      <div className="w-full bg-gray-200 rounded-full h-2">
                        <div
                          className={`h-2 rounded-full ${sessao.status === 'finalizado' ? 'bg-green-500' : 'bg-indigo-600'}`}
                          style={{ width: `${progresso}%` }}
                        />
                      </div>
                    </div>

                    <div className="flex justify-between items-center text-sm">
                      <span className="text-gray-500">
                        Tempo: {formatarTempo(sessao.tempo_gasto?.total_segundos || 0)}
                      </span>
                      <div className="flex gap-2">
                        {sessao.versao_relatorio !== tipoRelatorio.versao_atual && (
                          <span className="px-2 py-1 bg-orange-100 text-orange-700 rounded text-xs">
                            v{sessao.versao_relatorio} (legada)
                          </span>
                        )}
                        <span className={`px-2 py-1 rounded text-xs ${
                          sessao.status === 'finalizado' 
                            ? 'bg-green-100 text-green-700' 
                            : 'bg-blue-100 text-blue-700'
                        }`}>
                          {sessao.status === 'finalizado' ? '✓ Finalizado' : 'Em andamento'}
                        </span>
                      </div>
                    </div>

                    <button
                      onClick={() => reabrirSessao(sessao.id)}
                      className="w-full mt-3 p-2 bg-indigo-600 text-white rounded hover:bg-indigo-700"
                    >
                      {sessao.status === 'finalizado' ? 'Visualizar' : 'Continuar'}
                    </button>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }

  // Tela Configurações
  if (tela === 'configuracoes') {
    return (
      <div className="min-h-screen bg-gray-50 p-4">
        <div className="max-w-2xl mx-auto">
          <div className="mb-6">
            <button
              onClick={() => setTela('inicio')}
              className="text-indigo-600 hover:text-indigo-700 mb-4"
            >
              ← Voltar
            </button>
            <h2 className="text-2xl font-bold text-gray-800">Configurações</h2>
          </div>

          <div className="bg-white rounded-lg shadow p-6 mb-4">
            <h3 className="font-semibold text-gray-800 mb-4">Dados Padrão</h3>
            
            <div className="space-y-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Nome da Equipe
                </label>
                <input
                  type="text"
                  value={configs.dados_tecnicos.nome_equipe}
                  onChange={(e) => setConfigs({
                    ...configs,
                    dados_tecnicos: { ...configs.dados_tecnicos, nome_equipe: e.target.value }
                  })}
                  className="w-full p-2 border rounded"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Técnico Interno
                </label>
                <input
                  type="text"
                  value={configs.dados_tecnicos.tecnico_interno}
                  onChange={(e) => setConfigs({
                    ...configs,
                    dados_tecnicos: { ...configs.dados_tecnicos, tecnico_interno: e.target.value }
                  })}
                  className="w-full p-2 border rounded"
                />
              </div>

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">
                  Placa do Veículo
                </label>
                <input
                  type="text"
                  value={configs.dados_tecnicos.placa_veiculo}
                  onChange={(e) => setConfigs({
                    ...configs,
                    dados_tecnicos: { ...configs.dados_tecnicos, placa_veiculo: e.target.value }
                  })}
                  className="w-full p-2 border rounded"
                />
              </div>

              <button
                onClick={async () => {
                  await db.salvarConfiguracao('dados_tecnicos', configs.dados_tecnicos);
                  alert('✓ Configurações salvas com sucesso!');
                }}
                className="w-full p-3 bg-indigo-600 text-white rounded hover:bg-indigo-700"
              >
                Salvar Dados Padrão
              </button>
            </div>
          </div>

          <div className="bg-white rounded-lg shadow p-6">
            <h3 className="font-semibold text-gray-800 mb-4 text-red-600">Zona de Perigo</h3>
            
            <button
              onClick={async () => {
                if (confirm('Deseja realmente apagar TODAS as sessões? Esta ação não pode ser desfeita!')) {
                  const todasSessoes = await db.carregarSessoes();
                  for (const sessao of todasSessoes) {
                    await db.deletarSessao(sessao.id);
                  }
                  alert('✓ Todas as sessões foram apagadas');
                }
              }}
              className="w-full p-3 bg-red-600 text-white rounded hover:bg-red-700 flex items-center justify-center gap-2"
            >
              <Trash2 size={18} />
              Apagar Todas as Sessões
            </button>
          </div>

          <div className="mt-6 text-center text-sm text-gray-500">
            <p>Versão da App: {RELATORIOS_CONFIG.versao_atual}</p>
            <p>Última atualização: {RELATORIOS_CONFIG.data_atualizacao}</p>
          </div>
        </div>
      </div>
    );
  }

  // Tela Formulário
  if (tela === 'formulario' && sessaoAtual) {
    const progresso = calcularProgresso();

    return (
      <div className="min-h-screen bg-gray-50">
        {/* Header fixo */}
        <div className="bg-white shadow-md sticky top-0 z-10 p-4">
          <div className="max-w-4xl mx-auto">
            <div className="flex justify-between items-center mb-3">
              <button
                onClick={() => {
                  if (confirm('Deseja sair? Seu progresso está salvo.')) {
                    setTela('inicio');
                  }
                }}
                className="text-indigo-600 hover:text-indigo-700"
              >
                ← Voltar
              </button>
              
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-2 text-sm text-gray-600">
                  <Clock size={16} />
                  {formatarTempo(tempoGasto)}
                </div>
                {salvando && (
                  <div className="flex items-center gap-2 text-sm text-green-600">
                    <Save size={16} />
                    Salvando...
                  </div>
                )}
              </div>
            </div>

            <h2 className="text-xl font-bold text-gray-800 mb-3">
              {sessaoAtual.estrutura.titulo}
            </h2>

            <div className="mb-3">
              <div className="flex justify-between text-sm text-gray-600 mb-1">
                <span>Progresso: {progresso.respondidas}/{progresso.total}</span>
                <span>{progresso.percentual}%</span>
              </div>
              <div className="w-full bg-gray-200 rounded-full h-2">
                <div
                  className="bg-indigo-600 h-2 rounded-full transition-all"
                  style={{ width: `${progresso.percentual}%` }}
                />
              </div>
            </div>

            <div className="flex items-center gap-2">
              <input
                type="checkbox"
                id="mostrarPendentes"
                checked={mostrarApenasPendentes}
                onChange={(e) => setMostrarApenasPendentes(e.target.checked)}
                className="rounded"
              />
              <label htmlFor="mostrarPendentes" className="text-sm text-gray-700 flex items-center gap-2">
                {mostrarApenasPendentes ? <EyeOff size={16} /> : <Eye size={16} />}
                Mostrar apenas campos pendentes
              </label>
            </div>
          </div>
        </div>

        {/* Conteúdo do formulário */}
        <div className="max-w-4xl mx-auto p-4">
          <div className="bg-white rounded-lg shadow p-6 mb-6">
            {sessaoAtual.estrutura.perguntas.map(pergunta => renderizarCampo(pergunta))}
          </div>

          <button
            onClick={gerarRelatorio}
            className="w-full p-4 bg-green-600 text-white rounded-lg shadow-lg hover:bg-green-700 flex items-center justify-center gap-3 text-lg font-semibold mb-20"
          >
            <FileText size={24} />
            Gerar Relatório Final
          </button>
        </div>

        {/* Modal de Ajuda */}
        {mostrarAjuda && (
          <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
            <div className="bg-white rounded-lg shadow-xl max-w-md w-full p-6">
              <div className="flex items-center gap-2 mb-4">
                <HelpCircle size={24} className="text-blue-500" />
                <h3 className="text-lg font-semibold">{mostrarAjuda.ajuda.titulo}</h3>
              </div>
              <div className="text-gray-700 whitespace-pre-line mb-6">
                {mostrarAjuda.ajuda.conteudo}
              </div>
              <button
                onClick={() => setMostrarAjuda(null)}
                className="w-full p-2 bg-indigo-600 text-white rounded hover:bg-indigo-700"
              >
                Entendi
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  return null;
};

export default App;
		
		
		
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registrado'))
                .catch(err => console.error('Erro ao registrar SW:', err));
        }
    </script>
