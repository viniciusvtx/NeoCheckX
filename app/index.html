<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#DC2626">
    <title>NeoCheckX - Relatórios</title>
    <link rel="icon" href="/NeoCheckX/favicon.ico" type="image/x-icon">
    <link rel="manifest" href="/NeoCheckX/app/manifest.json">
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, color = 'currentColor', size = 24, className = '' }) => {
            const iconNameKebab = name.replace(/([a-z0-9]|(?=[A-Z]))([A-Z])/g, '$1-$2').toLowerCase();
            useEffect(() => {
                if (window.lucide) lucide.createIcons();
            }, [name, size, color, className]);

            if (!window.lucide || !lucide.icons[iconNameKebab]) {
                return <span className={`icon-placeholder ${className}`} style={{ width: size, height: size, display: 'inline-block' }} />;
            }
            const iconSvg = lucide.icons[iconNameKebab].toSvg({ color, 'stroke-width': 2, width: size, height: size });
            return <span className={`inline-flex justify-center items-center ${className}`} dangerouslySetInnerHTML={{ __html: iconSvg }} />;
        };
        
        const CustomModal = ({ modal, setModal }) => {
            if (!modal) return null;
            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[100]">
                    <div className="bg-white rounded-lg shadow-xl max-w-sm w-full p-6 text-center">
                        <h3 className="text-lg font-bold text-gray-800 mb-4">{modal.title || 'NeoCheckX'}</h3>
                        <p className="text-gray-700 whitespace-pre-line mb-6">{modal.message}</p>
                        <div className="flex gap-4">
                            {modal.confirm ? (
                                <>
                                    <button onClick={() => { if(modal.onCancel) modal.onCancel(); setModal(null); }} className="flex-1 p-2 bg-gray-300 rounded hover:bg-gray-400">Cancelar</button>
                                    <button onClick={() => { if(modal.onConfirm) modal.onConfirm(); setModal(null); }} className="flex-1 p-2 bg-red-600 text-white rounded hover:bg-red-700">Confirmar</button>
                                </>
                            ) : (
                                <button onClick={() => setModal(null)} className="w-full p-2 bg-red-600 text-white rounded hover:bg-red-700">OK</button>
                            )}
                        </div>
                    </div>
                </div>
            );
        };
        
        const useIndexedDB = () => {
          const dbName = 'RelatoriosTecnicosDB';
          const dbVersion = 1;

          const openDB = () => {
            return new Promise((resolve, reject) => {
              const request = indexedDB.open(dbName, dbVersion);
              request.onerror = () => reject(request.error);
              request.onsuccess = () => resolve(request.result);
              request.onupgradeneeded = (event) => {
                const db = event.target.result;
                if (!db.objectStoreNames.contains('sessoes')) {
                  db.createObjectStore('sessoes', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('configuracoes')) {
                  db.createObjectStore('configuracoes', { keyPath: 'chave' });
                }
              };
            });
          };

          const salvarSessao = async (sessao) => {
            const db = await openDB();
            const transaction = db.transaction(['sessoes'], 'readwrite');
            const store = transaction.objectStore('sessoes');
            store.put(sessao);
            return new Promise((resolve, reject) => {
              transaction.oncomplete = () => resolve();
              transaction.onerror = () => reject(transaction.error);
            });
          };

          const carregarSessoes = async () => {
            const db = await openDB();
            const transaction = db.transaction(['sessoes'], 'readonly');
            const store = transaction.objectStore('sessoes');
            const request = store.getAll();
            return new Promise((resolve, reject) => {
              request.onsuccess = () => resolve(request.result);
              request.onerror = () => reject(request.error);
            });
          };
          
          const deletarSessao = async (id) => {
             const db = await openDB();
             const transaction = db.transaction(['sessoes'], 'readwrite');
             const store = transaction.objectStore('sessoes');
             store.delete(id);
             return new Promise((resolve, reject) => {
                transaction.oncomplete = () => resolve();
                transaction.onerror = () => reject(transaction.error);
             });
          };

          const salvarConfiguracao = async (chave, valor) => {
            const db = await openDB();
            const transaction = db.transaction(['configuracoes'], 'readwrite');
            const store = transaction.objectStore('configuracoes');
            store.put({ chave, valor });
            return new Promise((resolve, reject) => {
              transaction.oncomplete = () => resolve();
              transaction.onerror = () => reject(transaction.error);
            });
          };

          const carregarConfiguracao = async (chave) => {
            const db = await openDB();
            const transaction = db.transaction(['configuracoes'], 'readonly');
            const store = transaction.objectStore('configuracoes');
            const request = store.get(chave);
            return new Promise((resolve, reject) => {
              request.onsuccess = () => resolve(request.result?.valor);
              request.onerror = () => reject(request.error);
            });
          };

          return { salvarSessao, carregarSessoes, deletarSessao, salvarConfiguracao, carregarConfiguracao };
        };
        
        const App = () => {
            const [tela, setTela] = useState(window.location.hash.replace('#', '') || 'inicio');
            const [sessoes, setSessoes] = useState([]);
            const [sessaoAtual, setSessaoAtual] = useState(null);
            const [respostas, setRespostas] = useState({});
            const [configs, setConfigs] = useState({
                dados_tecnicos: { nome_equipe: '', tecnico_interno: '', placa_veiculo: '', tipo_veiculo: '' }
            });
            const db = useIndexedDB();
            const [relatoriosConfig, setRelatoriosConfig] = useState(null);
            const [modal, setModal] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                const carregarTudo = async () => {
                    setIsLoading(true);
                    try {
                        const configsSalvas = await db.carregarConfiguracao('dados_tecnicos');
                        if (configsSalvas) {
                           setConfigs(prev => ({...prev, dados_tecnicos: {...prev.dados_tecnicos, ...configsSalvas} }));
                        }
                        
                        const response = await fetch('/NeoCheckX/relatorios.json?t=' + new Date().getTime());
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const data = await response.json();
                        setRelatoriosConfig(data);
                    } catch (error) {
                        console.error("Erro ao carregar configurações:", error);
                        setModal({ title: 'Erro de Configuração', message: 'Não foi possível carregar o arquivo de configuração dos relatórios. Verifique sua conexão ou o arquivo JSON.' });
                    } finally {
                        setIsLoading(false);
                    }
                };
                carregarTudo();

                const handleHashChange = () => {
                    const hash = window.location.hash.replace('#', '') || 'inicio';
                    setTela(hash);
                };
                window.addEventListener('hashchange', handleHashChange);
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, []);

            const mudarTela = (novaTela) => {
                window.location.hash = novaTela;
            };

            const salvarConfiguracoes = async () => {
                try {
                    await db.salvarConfiguracao('dados_tecnicos', configs.dados_tecnicos);
                    setModal({ message: '✓ Configurações salvas com sucesso!' });
                } catch (e) {
                    setModal({ title: "Erro", message: "Não foi possível salvar as configurações."})
                }
            };
            
            if (isLoading) {
                return <div className="flex items-center justify-center h-screen text-gray-600">Carregando configurações...</div>;
            }
            
            if (tela === 'inicio') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-red-50 to-orange-100 p-4">
                        <CustomModal modal={modal} setModal={setModal} />
                        <div className="max-w-md mx-auto pt-20">
                            <div className="text-center mb-12">
                                <Icon name="file-text" size={64} className="mx-auto mb-4 text-red-600" />
                                <h1 className="text-3xl font-bold text-gray-800 mb-2">NeoCheckX</h1>
                                <p className="text-gray-600">Sistema offline para visitas técnicas</p>
                            </div>
                            <div className="space-y-4">
                                <button onClick={() => mudarTela('novo_relatorio')} className="w-full p-4 bg-red-600 text-white rounded-lg shadow-lg hover:bg-red-700 flex items-center justify-center gap-3 text-lg font-semibold">
                                    <Icon name="plus" size={24} /> Nova Sessão
                                </button>
                                <button onClick={async () => {
                                    const sessoesSalvas = await db.carregarSessoes();
                                    setSessoes(sessoesSalvas);
                                    mudarTela('sessoes');
                                }} className="w-full p-4 bg-white text-red-600 rounded-lg shadow-lg hover:bg-gray-50 flex items-center justify-center gap-3 text-lg font-semibold border-2 border-red-600">
                                    <Icon name="folder-open" size={24} /> Reabrir Sessão
                                </button>
                                <button onClick={() => mudarTela('configuracoes')} className="w-full p-4 bg-white text-gray-700 rounded-lg shadow hover:bg-gray-50 flex items-center justify-center gap-3">
                                    <Icon name="settings" size={20} /> Configurações
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (tela === 'novo_relatorio') {
                return (
                  <div className="min-h-screen bg-gray-50 p-4">
                    <div className="max-w-2xl mx-auto">
                      <div className="mb-6">
                        <button onClick={() => mudarTela('inicio')} className="text-red-600 hover:text-red-700 mb-4">← Voltar</button>
                        <h2 className="text-2xl font-bold text-gray-800">Selecione o tipo de relatório</h2>
                      </div>
                      <div className="space-y-4">
                        {relatoriosConfig && Object.entries(relatoriosConfig.relatorios).map(([id, rel]) => {
                          const versao = rel.versoes[rel.versao_atual];
                          return (
                            <button key={id} onClick={() => alert("Função 'iniciar nova sessão' não implementada")} className="w-full p-6 bg-white rounded-lg shadow hover:shadow-lg transition-shadow text-left">
                              <h3 className="text-xl font-semibold text-gray-800 mb-2">{versao.titulo}</h3>
                              <p className="text-gray-600 text-sm mb-3">{versao.descricao}</p>
                              <div className="text-xs text-gray-500">Versão {rel.versao_atual} • {versao.perguntas.length} perguntas</div>
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  </div>
                );
            }

            if (tela === 'sessoes') {
                return (
                    <div className="min-h-screen bg-gray-50 p-4">
                        <div className="max-w-2xl mx-auto">
                           <div className="mb-6">
                                <button onClick={() => mudarTela('inicio')} className="text-red-600 hover:text-red-700 mb-4">← Voltar</button>
                                <h2 className="text-2xl font-bold text-gray-800">Sessões Salvas</h2>
                            </div>
                            {sessoes.length === 0 ? (
                                <p className="text-center text-gray-500">Nenhuma sessão salva.</p>
                            ) : (
                                <div className="space-y-4">
                                {sessoes.map(s => <div key={s.id} className="bg-white p-4 rounded-lg shadow">Sessão: {s.id}</div>)}
                                </div>
                            )}
                        </div>
                    </div>
                )
            }
            
            if (tela === 'configuracoes') {
                 return (
                    <div className="min-h-screen bg-gray-50 p-4">
                        <CustomModal modal={modal} setModal={setModal} />
                        <div className="max-w-2xl mx-auto">
                            <div className="mb-6">
                                <button onClick={() => mudarTela('inicio')} className="text-red-600 hover:text-red-700 mb-4">← Voltar</button>
                                <h2 className="text-2xl font-bold text-gray-800">Configurações</h2>
                            </div>
                            <div className="bg-white rounded-lg shadow p-6 mb-4">
                                <h3 className="font-semibold text-gray-800 mb-4">Dados Padrão</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Nome da Equipe</label>
                                        <input type="text" value={configs.dados_tecnicos.nome_equipe || ''} onChange={(e) => setConfigs(prev => ({ ...prev, dados_tecnicos: { ...prev.dados_tecnicos, nome_equipe: e.target.value } }))} className="w-full p-2 border rounded" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Técnico Interno</label>
                                        <input type="text" value={configs.dados_tecnicos.tecnico_interno || ''} onChange={(e) => setConfigs(prev => ({ ...prev, dados_tecnicos: { ...prev.dados_tecnicos, tecnico_interno: e.target.value } }))} className="w-full p-2 border rounded" />
                                    </div>
                                     <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Placa do Veículo</label>
                                        <input type="text" value={configs.dados_tecnicos.placa_veiculo || ''} onChange={(e) => setConfigs(prev => ({ ...prev, dados_tecnicos: { ...prev.dados_tecnicos, placa_veiculo: e.target.value } }))} className="w-full p-2 border rounded" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Tipo de Veículo</label>
                                        <input type="text" value={configs.dados_tecnicos.tipo_veiculo || ''} onChange={(e) => setConfigs(prev => ({ ...prev, dados_tecnicos: { ...prev.dados_tecnicos, tipo_veiculo: e.target.value } }))} className="w-full p-2 border rounded" />
                                    </div>
                                    <button onClick={salvarConfiguracoes} className="w-full p-3 bg-red-600 text-white rounded hover:bg-red-700">Salvar Dados Padrão</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return <div className="flex items-center justify-center h-screen">Página não encontrada.</div>;
        };
        
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/NeoCheckX/app/service-worker.js', { scope: '/NeoCheckX/app/' })
                    .then(reg => console.log('Service Worker registrado com sucesso.'))
                    .catch(err => console.error('Erro ao registrar SW:', err));
            });
        }
    </script>
</body>
</html>
